name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  structure:
    name: Structure & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Required files
        run: |
          for f in README.md LICENSE requirements.txt; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

      - name: Python syntax check (src/, scripts/, tests/)
        run: |
          python -m compileall -q src/
          [ -d scripts ] && python -m compileall -q scripts/
          [ -d tests ] && python -m compileall -q tests/
          true

      - name: YAML configs parse
        run: |
          pip install -q pyyaml
          python -c "
          import sys, pathlib, yaml
          fail = 0
          for p in list(pathlib.Path('configs').rglob('*.yaml')) + list(pathlib.Path('configs').rglob('*.yml')):
              try: yaml.safe_load(p.read_text())
              except Exception as e: print(f'::error file={p}::{e}'); fail += 1
          sys.exit(fail)
          "

      - name: README internal links resolve
        run: |
          missing=0
          for link in $(grep -oE '\]\([^)]+\)' README.md | sed 's|](||; s|)$||' | grep -v '^http' | grep -v '^#' | sort -u); do
            path="${link%%#*}"
            [ -z "$path" ] && continue
            if [ ! -e "$path" ]; then
              echo "::warning::README links to missing path: $link"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing README link(s) point to non-existent paths"
          fi

      - name: No committed secrets
        run: |
          if grep -rEn 'AIza[0-9A-Za-z_-]{35}|hf_[A-Za-z0-9]{32,}|sk-[A-Za-z0-9]{32,}' src/ scripts/ configs/ 2>/dev/null; then
            echo "::error::Potential secret detected in tracked source"
            exit 1
          fi

  imports:
    name: Import resolvability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # torch is consumed from the system on the original GPU box (the venv uses
      # --system-site-packages) and is not declared, so install a CPU build here.
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      # 'utils' is the sibling hot-mess-of-ai metric module, loaded via sys.path.
      - name: All top-level imports resolve
        run: python tools/check_imports.py utils
