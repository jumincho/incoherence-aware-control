experiment:
  name: gpqa_incoh_round4_spend_core5
  run_id: null
  output_root: runs

runtime:
  dtype: bfloat16
  use_fast_tokenizer: false
  trust_remote_code: true
  max_retries: 2

models:
  main: Qwen/Qwen3-14B
  anchor: Qwen/Qwen3-1.7B

dataset:
  name: Wanfq/gpqa
  config: gpqa_main
  split: train
  n_questions: 400
  sample_seed: 20260227

evaluation:
  trial_seeds: [11, 22, 33, 44, 55, 66, 77]
  total_token_budgets: [200, 300, 450, 600, 750, 900, 1200, 1500]
  compare_to: baseline_longcot
  parse_policy: P1R
  enable_parse_repair: true
  repair_min_remaining_tokens: 24
  repair_max_new_tokens: 16
  repair_temperature: 0.0
  repair_top_p: 1.0
  success:
    incoherence_reduction_min_rel: 0.10
    incoherence_reduction_min_abs: 0.00
    require_no_sig_accuracy_drop: true

methods:
  - baseline_longcot
  - hard_cap
  - budgeted_self_consistency
  - ours_controller_v2
  - ours_controller_v2_nofallback

method_params:
  baseline_longcot:
    max_new_tokens: 768
    temperature: 0.6
    top_p: 0.95

  hard_cap:
    max_new_tokens: 80
    temperature: 0.6
    top_p: 0.95

  budgeted_self_consistency:
    max_rounds: 12
    per_sample_max_new_tokens: 96
    early_majority_stop: false
    fallback_max_new_tokens: 80
    temperature: 0.7
    top_p: 0.95

  ours_controller_v2:
    n_probe: 4
    n_probe_first: 2
    n_probe_second: 2
    probe_max_new_tokens: 48
    probe_budget_ratio: 0.12
    probe_budget_cap: 96
    min_probe_budget_tokens: 48
    solve_min_ratio: 0.60
    solve_min_floor: 180
    low_budget_threshold: 900
    enable_low_budget_fallback: true
    fallback_hard_cap_tokens: 80
    solve_max_new_tokens: 220
    restart_max_new_tokens: 120
    stop_conf_threshold: 0.67
    max_restart: 1
    temperature: 0.6
    top_p: 0.95

  ours_controller_v2_nofallback:
    n_probe: 4
    n_probe_first: 2
    n_probe_second: 2
    probe_max_new_tokens: 48
    probe_budget_ratio: 0.12
    probe_budget_cap: 96
    min_probe_budget_tokens: 48
    solve_min_ratio: 0.60
    solve_min_floor: 180
    low_budget_threshold: 0
    enable_low_budget_fallback: false
    fallback_hard_cap_tokens: 80
    solve_max_new_tokens: 220
    restart_max_new_tokens: 120
    stop_conf_threshold: 0.67
    max_restart: 1
    temperature: 0.6
    top_p: 0.95
