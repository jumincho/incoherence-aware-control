experiment:
  name: gpqa_incoh_round5b_heldout_splitB
  run_id: null
  output_root: runs

runtime:
  dtype: bfloat16
  use_fast_tokenizer: false
  trust_remote_code: true
  max_retries: 2

models:
  main: Qwen/Qwen3-14B
  anchor: Qwen/Qwen3-1.7B

dataset:
  name: Wanfq/gpqa
  config: gpqa_main
  split: train
  n_questions: 400
  sample_seed: 20260227
  subset_start: 200
  subset_end: 400

evaluation:
  trial_seeds: [11, 22, 33, 44, 55]
  total_token_budgets: [200, 300, 450, 600, 900, 1200, 1500]
  compare_to: hard_cap
  parse_policy: P1R
  enable_parse_repair: true
  repair_min_remaining_tokens: 16
  repair_max_new_tokens: 12
  repair_temperature: 0.0
  repair_top_p: 1.0
  success:
    incoherence_reduction_min_rel: 0.05
    incoherence_reduction_min_abs: 0.00
    require_no_sig_accuracy_drop: true

methods:
  - hard_cap
  - budgeted_self_consistency
  - probe_only_fixedk
  - ours_controller_v2_nofallback
  - ours_controller_v2_nofallback_forcecontinue

method_params:
  hard_cap:
    max_new_tokens: 80
    temperature: 0.6
    top_p: 0.95

  budgeted_self_consistency:
    per_sample_max_new_tokens: 64
    temperature: 0.6
    top_p: 0.95
    max_samples: 64

  probe_only_fixedk:
    n_probe: 4
    per_probe_max_new_tokens: 48
    fallback_max_new_tokens: 48
    temperature: 0.6
    top_p: 0.95

  ours_controller_v2_nofallback:
    n_probe: 4
    n_probe_first: 2
    n_probe_second: 2
    probe_max_new_tokens: 48
    probe_budget_ratio: 0.12
    probe_budget_cap: 96
    min_probe_budget_tokens: 48
    solve_min_ratio: 0.60
    solve_min_floor: 180
    low_budget_threshold: 0
    enable_low_budget_fallback: false
    fallback_hard_cap_tokens: 80
    solve_max_new_tokens: 220
    restart_max_new_tokens: 120
    stop_conf_threshold: 0.67
    max_restart: 1
    temperature: 0.6
    top_p: 0.95

  ours_controller_v2_nofallback_forcecontinue:
    n_probe: 4
    n_probe_first: 2
    n_probe_second: 2
    probe_max_new_tokens: 48
    probe_budget_ratio: 0.12
    probe_budget_cap: 96
    min_probe_budget_tokens: 48
    solve_min_ratio: 0.60
    solve_min_floor: 180
    low_budget_threshold: 0
    enable_low_budget_fallback: false
    fallback_hard_cap_tokens: 80
    # Fixed from Round5-A tuning before Round5-B execution.
    force_continue_disagreement_threshold: 0.25
    solve_max_new_tokens: 220
    restart_max_new_tokens: 120
    stop_conf_threshold: 0.67
    max_restart: 1
    temperature: 0.6
    top_p: 0.95
