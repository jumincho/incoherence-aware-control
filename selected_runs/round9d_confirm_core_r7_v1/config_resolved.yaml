experiment:
  name: gpqa_incoh_round9d_confirm_core_r7
  run_id: null
  output_root: runs
runtime:
  dtype: bfloat16
  use_fast_tokenizer: false
  trust_remote_code: true
  max_retries: 2
models:
  main: Qwen/Qwen3-14B
  anchor: Qwen/Qwen3-1.7B
dataset:
  name: Wanfq/gpqa
  config: gpqa_main
  split: train
  format: gpqa
  n_questions: 600
  sample_seed: 20260430
  subset_start: 300
  subset_end: 600
evaluation:
  trial_seeds:
  - 11
  - 22
  - 33
  - 44
  - 55
  - 66
  - 77
  total_token_budgets:
  - 400
  - 500
  - 600
  compare_to: hard_cap
  parse_policy: P1R
  enable_parse_repair: true
  repair_min_remaining_tokens: 64
  enforce_strict_repair_reserve: true
  repair_max_new_tokens: 12
  repair_temperature: 0.0
  repair_top_p: 1.0
  success:
    incoherence_reduction_min_rel: 0.05
    incoherence_reduction_min_abs: 0.0
    require_no_sig_accuracy_drop: true
methods:
- hard_cap
- hard_cap_matched
- probe_only_fixedk_k4
- ours_controller_v3_nofallback
method_params:
  hard_cap:
    max_new_tokens: 80
    temperature: 0.6
    top_p: 0.95
  hard_cap_matched:
    max_new_tokens: 80
    max_new_tokens_by_budget:
      '400': 101
      '500': 164
      '600': 237
    temperature: 0.6
    top_p: 0.95
  probe_only_fixedk_k4:
    n_probe: 4
    per_probe_max_new_tokens: 64
    fallback_max_new_tokens: 48
    temperature: 0.6
    top_p: 0.95
  ours_controller_v3_nofallback:
    n_probe: 8
    n_probe_first: 2
    n_probe_second: 2
    probe_max_new_tokens: 64
    probe_budget_ratio: 0.35
    probe_budget_cap: 600
    min_probe_budget_tokens: 32
    solve_min_ratio: 0.4
    solve_min_floor: 128
    solve_max_new_tokens: 512
    restart_max_new_tokens: 192
    stop_conf_threshold: 0.75
    low_budget_stop_forbid_threshold: 600
    enable_stop_after_probe: true
    max_restart: 1
    low_budget_threshold: 0
    enable_low_budget_fallback: false
    fallback_hard_cap_tokens: 80
    temperature: 0.6
    top_p: 0.95
